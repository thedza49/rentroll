<!DOCTYPE html>

<html>
<head>
    <title>Upload Rent Roll</title>


<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">


</head>

<body>

<div class="container mt-5">


<h1 class="mb-4">
    Rent Roll Portal
</h1>

<div class="card p-4 shadow-sm">

    <h4 class="mb-4">
        Import Monthly Rent Roll
    </h4>

    <form
        method="POST"
        enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label">
                Rent Roll CSV
            </label>

            <input
                type="file"
                class="form-control"
                name="file"
                accept=".csv"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Snapshot Date
            </label>

            <input
                type="date"
                class="form-control"
                name="snapshot_date"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Import Snapshot

        </button>

        <a
            href="/"
            class="btn btn-secondary">

            Dashboard

        </a>

    </form>

</div>


</div>

</body>
</html>
